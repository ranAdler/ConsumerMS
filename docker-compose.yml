version: '3.8'

services:
  # MySQL Database for Consumer
  consumer-db:
    image: mysql:8.0
    container_name: consumer-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: consumer_db
      MYSQL_USER: consumer_user
      MYSQL_PASSWORD: consumer_password
    ports:
      - "3306:3306"
    volumes:
      - consumer_db_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - message-network

  # Zookeeper for Kafka coordination
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    ports:
      - "2181:2181"
    networks:
      - message-network
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
    networks:
      - message-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server=localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Topics Initialization
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: [
      "bash",
      "-c",
      "kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic message-create-topic --partitions 3 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic message-update-topic --partitions 3 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic message-delete-topic --partitions 3 --replication-factor 1 &&
       kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --topic message-read-topic --partitions 3 --replication-factor 1 &&
       echo 'Kafka topics created successfully'"
    ]
    networks:
      - message-network

volumes:
  consumer_db_data:
    driver: local

networks:
  message-network:
    driver: bridge